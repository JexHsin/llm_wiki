<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Wiki Web</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#101827;color:#e5e7eb}main{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:18px}section{background:#172033;border-radius:10px;padding:16px}textarea,input{width:100%;box-sizing:border-box;margin:6px 0;padding:8px}button{padding:8px 12px}pre{background:#050816;padding:10px;white-space:pre-wrap;overflow:auto;max-height:400px}
</style>
</head>
<body>
<main>
<section>
<h2>Chat</h2>
<input id="session" value="default">
<textarea id="message" rows="5" placeholder="请输入问题"></textarea>
<button onclick="sendChat()">发送</button>
<pre id="output"></pre>
</section>
<section>
<h2>Graph</h2>
<button onclick="refreshGraph()">刷新</button>
<h3>Stats</h3><pre id="stats"></pre>
<h3>Entities</h3><pre id="nodes"></pre>
<h3>Relations</h3><pre id="edges"></pre>
</section>
</main>
<script src="/app.js"></script>
</body>
</html>
